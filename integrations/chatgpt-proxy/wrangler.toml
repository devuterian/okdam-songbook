name = "songbook-chatgpt-proxy"
main = "src/index.ts"
compatibility_date = "2025-05-01"
workers_dev = true

# Plaintext (non-secret) values. Override per environment with `wrangler secret put`.
[vars]
CALLBACK_BASE_URL = "https://songbook-chatgpt-proxy.iam-marierie.workers.dev"
SESSION_TTL_SECONDS = "43200"
# Comma-separated allowlist of GPT redirect URIs ChatGPT may use to receive
# our minted authorization code. The <GPT_ID> is replaced with the actual
# Custom GPT id after the GPT is created. The same /oauth/callback is also
# used by chat.openai.com during the OAuth handshake.
CHATGPT_REDIRECT_URI_ALLOWLIST = "https://chatgpt.com/aip/g-6a451de53b6c819196b0060d51bbe18e/oauth/callback,https://chat.openai.com/aip/g-6a451de53b6c819196b0060d51bbe18e/oauth/callback,https://chatgpt.com/aip/g-e28b96146711a68cded66f44e25445575e8e359b/oauth/callback,https://chat.openai.com/aip/g-e28b96146711a68cded66f44e25445575e8e359b/oauth/callback"
CODE_STORE_TTL_MS = "300000"
REFRESH_TOKEN_TTL_SECONDS = "2592000"

# `wrangler secret put` slots expected: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
# APPS_SCRIPT_URL, INTERNAL_PROXY_SECRET, MARIE_EMAIL, SEONGWOOK_EMAIL,
# YEOWOOL_EMAIL, COOKIE_SECRET, GPT_OAUTH_CLIENT_ID, GPT_OAUTH_CLIENT_SECRET
