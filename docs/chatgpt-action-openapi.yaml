openapi: 3.1.0
info:
  title: Songbook ChatGPT Action
  version: 2.0.0
  description: |
    Google OAuth 2.0 인증을 사용하는 Songbook ChatGPT Action.
    모든 요청은 Cloudflare Worker 프록시
    (integrations/chatgpt-proxy)를 거치며, Worker는 사용자 이메일
    allowlist (MARIE_EMAIL / SEONGWOOK_EMAIL / YEOWOOL_EMAIL)와
    INTERNAL_PROXY_SECRET을 Apps Script에 함께 전달한다.
    Apps Script는 INTERNAL_PROXY_SECRET과 actor 헤더를 검증한 뒤
    ChangeLog에 실제 로그인 사용자를 기록한다.
servers:
  - url: https://songbook-chatgpt-proxy.iam-marierie.workers.dev
    description: Cloudflare Worker OAuth proxy. Token endpoint는 /token, Google callback은 /oauth/callback.
paths:
  /api/gptSearchSongs:
    post:
      operationId: searchSongs
      summary: 곡 검색
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: 검색 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSearch"
        "401":
          description: 세션 없음 / 만료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "403":
          description: 허용되지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
  /api/gptCheckDuplicate:
    post:
      operationId: checkDuplicate
      summary: TJ 번호 또는 title+artist 중복 검사
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckDuplicateRequest"
      responses:
        "200":
          description: 중복 검사 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDuplicate"
  /api/gptAddSong:
    post:
      operationId: addSong
      summary: 곡 등록 (사용자 명시 승인 후에만 호출)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSongRequest"
      responses:
        "200":
          description: 등록 또는 중복 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAdd"
        "409":
          description: confirmed 누락 (CONFIRMATION_REQUIRED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
components:
  securitySchemes:
    GoogleOAuth:
      type: oauth2
      description: |
        ChatGPT ↔ Cloudflare Worker OAuth 2.0 authorization_code flow.
        Authorization URL /token URL은 모두 Worker 측이고, Worker가
        /oauth/callback에서 Google과 대화한 뒤 자체 code를 발급한다.
        ChatGPT는 그 code를 /token에 보내 access_token을 받는다.
      flows:
        authorizationCode:
          authorizationUrl: https://songbook-chatgpt-proxy.iam-marierie.workers.dev/authorize
          tokenUrl: https://songbook-chatgpt-proxy.iam-marierie.workers.dev/token
          scopes:
            openid: OpenID Connect 인증
            email: Google 계정 이메일
            profile: Google 계정 이름
  schemas:
    EnvelopeSearch:
      type: object
      required: [ok, data, error, requestId, serverTime]
      properties:
        ok: { type: boolean, enum: [true] }
        data:
          type: object
          properties:
            query: { type: string }
            total: { type: integer }
            songs:
              type: array
              items: { $ref: "#/components/schemas/Song" }
            actor: { type: string, description: 요청을 처리한 사용자 이메일 }
        error: { type: "null" }
        requestId: { type: string }
        serverTime: { type: string }
    EnvelopeDuplicate:
      type: object
      required: [ok, data, error, requestId, serverTime]
      properties:
        ok: { type: boolean, enum: [true] }
        data:
          type: object
          properties:
            duplicate: { type: boolean }
            matchedBy: { type: string, enum: [tjNumber, titleArtist], nullable: true }
            song: { oneOf: [{ $ref: "#/components/schemas/Song" }, { type: "null" }] }
        error: { type: "null" }
        requestId: { type: string }
        serverTime: { type: string }
    EnvelopeAdd:
      type: object
      required: [ok, data, error, requestId, serverTime]
      properties:
        ok: { type: boolean, enum: [true] }
        data:
          type: object
          properties:
            duplicate: { type: boolean }
            matchedBy: { type: string, enum: [clientRequestId, tjNumber, titleArtist], nullable: true }
            song: { oneOf: [{ $ref: "#/components/schemas/Song" }, { type: "null" }] }
        error: { type: "null" }
        requestId: { type: string }
        serverTime: { type: string }
    EnvelopeError:
      type: object
      required: [ok, data, error, requestId, serverTime]
      properties:
        ok: { type: boolean, enum: [false] }
        data: { type: "null" }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, enum: [BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, VALIDATION_ERROR, CONFIRMATION_REQUIRED, RATE_LIMITED, SHEET_SCHEMA_ERROR, INTERNAL_ERROR] }
            message: { type: string }
            details: { nullable: true }
        requestId: { type: string }
        serverTime: { type: string }
    SearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
    CheckDuplicateRequest:
      type: object
      properties:
        tjNumber: { type: string }
        title: { type: string }
        artist: { type: string }
    AddSongRequest:
      type: object
      required: [confirmed, clientRequestId, title, artist]
      properties:
        confirmed: { type: boolean, description: 사용자 명시 승인 후에만 true }
        clientRequestId: { type: string, description: UUID. 같은 값 재전송 시 멱등 처리. }
        title: { type: string }
        titleReadingKo: { type: string }
        titleRomanized: { type: string }
        titleAliases:
          type: array
          items: { type: string }
        artist: { type: string }
        artistReadingKo: { type: string }
        artistAliases:
          type: array
          items: { type: string }
        country: { type: string }
        genres:
          type: array
          items: { type: string }
        originalWork: { type: string }
        performerIds:
          type: array
          items: { type: string, enum: [marie, seongwook, yeowool, 뽀냐] }
        keyCandidates:
          type: array
          items:
            type: object
            required: [baseMode, offset, isPrimary]
            properties:
              id: { type: string }
              baseMode: { type: string, enum: [original, male, female, custom] }
              offset: { type: integer, minimum: -12, maximum: 12 }
              label: { type: string }
              memo: { type: string }
              isPrimary: { type: boolean }
        memo: { type: string }
        youtubeUrl: { type: string }
    Song:
      type: object
      properties:
        id: { type: string }
        tjNumber: { type: string }
        title: { type: string }
        titleReadingKo: { type: string }
        titleRomanized: { type: string }
        titleAliases:
          type: array
          items: { type: string }
        artist: { type: string }
        artistReadingKo: { type: string }
        artistAliases:
          type: array
          items: { type: string }
        country: { type: string }
        genres:
          type: array
          items: { type: string }
        originalWork: { type: string }
        keyCandidates:
          type: array
          items: { type: object }
        performerIds:
          type: array
          items: { type: string }
        memo: { type: string }
        status: { type: string }
        youtubeUrl: { type: string }
        sourceType: { type: string }
        sourceReference: { type: string }
        version: { type: integer }
        lastPerformedAt: { type: string }
        performanceCount: { type: integer }
security:
  - GoogleOAuth: [openid, email, profile]
